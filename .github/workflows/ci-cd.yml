name: CI

on:
  push:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '14'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install font-awesome
          npm install @types/jquery@3.5.5 @types/ws@7.4.7 @types/minimatch@3.0.5 angular-file@3.1.2

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: shopizer-admin-dist
          path: dist/
